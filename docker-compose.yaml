services:
  dagster_platform:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # Mount your local folder so edits sync instantly
      - .:/app  
    environment:
      - DAGSTER_HOME=/app
      # In development, we force a re-parse on load so that any changes 
      # made to .sql or .yml files on the host are immediately 
      # reflected in the Dagster UI without needing a container restart.
      - DAGSTER_DBT_PARSE_PROJECT_ON_LOAD=1
  evidence_dashboard:
    image: node:22-slim
    container_name: evidence_dashboard
    # Fix to help with hot reloading of pages
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=300
    volumes:
      # Sync project files from Windows
      - ./dashboard:/app
      # Sync evidence folder explicitly
      - ./dashboard/.evidence:/app/.evidence
      
      # Keep Linux node_modules inside Docker
      - evidence_node_modules:/app/node_modules

      # Mount database
      # TODO REVIEW
      # - ./data/dev_data_warehouse.db:/app/sources/amazon/amazon_data.db
      - ./data/db:/app/sources/data_warehouse/db
    ports:
      - "3001:3000"
    working_dir: /app
    # use to force refresh dependencies
    # command: sh -c "apt-get update && apt-get install -y git && mkdir -p /app && npm install && npm run sources && npm run dev -- --host --force"

    command: sh -c "apt-get update && apt-get install -y git && mkdir -p /app && npm install && npm run sources && npm run dev -- --host"

# ADD THIS HERE (outside services)
volumes:
  evidence_node_modules: